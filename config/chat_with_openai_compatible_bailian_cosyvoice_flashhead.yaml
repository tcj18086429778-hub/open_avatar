default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 8282
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  chat_engine:
    model_root: "models"
    concurrent_limit: 1  # FlashHead GPU 显存占用较高，建议单路
    handler_search_path:
      - "src/handlers"
    handler_configs:
      RtcClient:
        module: client/rtc_client/client_handler_rtc
        # max time a session will last for
        connection_ttl: 900
        turn_config:
          turn_provider: "turn_server"
          urls:
            - "turn:10.10.2.250:3478?transport=udp"
            - "turn:10.10.2.250:3478?transport=tcp"
          username: "admin"
          credential: "admin"
        output_video_fps: 25
      # === 打断处理器 - 接收 INTERRUPT 信号并执行流取消 ===
      InterruptHandler:
        module: logic/interrupt/interrupt_handler
      SileroVad:
        module: vad/silerovad/vad_handler_silero
        speaking_threshold: 0.5
        start_delay: 2048
        end_delay: 5000
        buffer_look_back: 5000
        speech_padding: 512
      SenseVoice:
        enabled: True
        module: asr/sensevoice/asr_handler_sensevoice
        model_name: "iic/SenseVoiceSmall"
      CosyVoice:
        enabled: True
        module: tts/bailian_tts/tts_handler_cosyvoice_bailian
        voice: "longxiaochun"
        model_name: "cosyvoice-v1"
        # api_key: "" # default=os.getenv("DASHSCOPE_API_KEY")
      LLMOpenAICompatible:
        enabled: True
        module: llm/openai_compatible/llm_handler_openai_compatible
        model_name: "qwen-plus"
        enable_video_input: False
        history_length: 20
        system_prompt: "请你扮演一个 AI 助手，用简短的两三句对话来回答用户的问题，并在对话内容中加入合适的标点符号，不需要讨论标点符号相关的内容"
        api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        # api_key: "" # default=os.getenv("DASHSCOPE_API_KEY")
      # === FlashHead 数字人 Avatar (Lite 模式) ===
      FlashHead:
        module: avatar/flashhead/avatar_handler_flashhead
        ckpt_dir: "models/SoulX-FlashHead-1_3B"
        wav2vec_dir: "models/wav2vec2-base-960h"
        model_type: "lite"
        cond_image_path: "resource/avatar/flashhead/custom_avatar_chatgpt_20260508_110155.png"  # 替换为你的图像
        fps: 25
        base_seed: 42
        use_face_crop: false
        debug: false
        idle_noise_amplitude: 0.003
        video_delay_ms: 320
        video_speed_ratio: 0.94
